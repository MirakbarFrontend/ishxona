<!doctype html>
<html lang="uz">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Pinchuza — Ish hisobi</title>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			:root {
				--bg: #0b0d12;
				--surface: #12151d;
				--surface2: #181c27;
				--border: #1e2336;
				--accent: #4f8ef7;
				--accent-g: rgba(79, 142, 247, 0.15);
				--accent-d: rgba(79, 142, 247, 0.07);
				--text: #e4e8f0;
				--muted: #5a6380;
				--muted2: #8892aa;
				--green: #34d399;
				--green-g: rgba(52, 211, 153, 0.12);
				--amber: #fbbf24;
				--amber-g: rgba(251, 191, 36, 0.12);
				--coral: #f87171;
				--coral-g: rgba(248, 113, 113, 0.12);
				--purple: #a78bfa;
				--purple-g: rgba(167, 139, 250, 0.12);
				--teal: #2dd4bf;
				--teal-g: rgba(45, 212, 191, 0.12);
				--sidebar-w: 240px;
			}
			body {
				min-height: 100vh;
				background: var(--bg);
				font-family: 'Inter', sans-serif;
				color: var(--text);
				display: flex;
			}

			/* SIDEBAR */
			.sidebar {
				width: var(--sidebar-w);
				min-height: 100vh;
				background: var(--surface);
				border-right: 1px solid var(--border);
				display: flex;
				flex-direction: column;
				flex-shrink: 0;
				position: fixed;
				top: 0;
				left: 0;
				bottom: 0;
				z-index: 100;
			}
			.sidebar-brand {
				padding: 24px 20px 20px;
				border-bottom: 1px solid var(--border);
				display: flex;
				align-items: center;
				gap: 12px;
			}
			.brand-logo {
				width: 36px;
				height: 36px;
				background: var(--accent-d);
				border: 1px solid rgba(79, 142, 247, 0.25);
				border-radius: 10px;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
				box-shadow: 0 0 16px var(--accent-g);
			}
			.brand-logo svg {
				width: 18px;
				height: 18px;
				stroke: var(--accent);
				fill: none;
				stroke-width: 1.8;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
			.brand-text strong {
				font-size: 15px;
				font-weight: 700;
				color: var(--text);
			}
			.brand-text span {
				font-size: 11px;
				color: var(--muted);
				display: block;
			}
			.sidebar-nav {
				padding: 16px 12px;
				flex: 1;
				overflow-y: auto;
			}
			.nav-section {
				margin-bottom: 24px;
			}
			.nav-label {
				font-size: 10px;
				font-weight: 600;
				letter-spacing: 1px;
				text-transform: uppercase;
				color: var(--muted);
				padding: 0 8px;
				margin-bottom: 6px;
			}
			.nav-item {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 9px 10px;
				border-radius: 8px;
				font-size: 13.5px;
				font-weight: 500;
				color: var(--muted2);
				cursor: pointer;
				transition: all 0.15s;
				text-decoration: none;
				margin-bottom: 2px;
			}
			.nav-item svg {
				width: 16px;
				height: 16px;
				flex-shrink: 0;
				stroke: currentColor;
				fill: none;
				stroke-width: 1.8;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
			.nav-item:hover {
				background: var(--surface2);
				color: var(--text);
			}
			.nav-item.active {
				background: var(--accent-g);
				color: var(--accent);
				border: 1px solid rgba(79, 142, 247, 0.2);
			}
			.nav-badge {
				margin-left: auto;
				font-size: 11px;
				font-weight: 600;
				background: var(--accent);
				color: #fff;
				padding: 1px 7px;
				border-radius: 20px;
			}
			.sidebar-footer {
				padding: 16px 12px;
				border-top: 1px solid var(--border);
			}
			.user-card {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px;
				border-radius: 10px;
				background: var(--surface2);
			}
			.user-avatar {
				width: 32px;
				height: 32px;
				border-radius: 50%;
				background: var(--accent-g);
				border: 1px solid rgba(79, 142, 247, 0.3);
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 13px;
				font-weight: 700;
				color: var(--accent);
				flex-shrink: 0;
			}
			.user-info {
				flex: 1;
			}
			.user-name {
				font-size: 13px;
				font-weight: 600;
				color: var(--text);
			}
			.user-role {
				font-size: 11px;
				color: var(--muted);
			}
			.logout-btn {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-top: 8px;
				padding: 8px 10px;
				border-radius: 8px;
				font-size: 12.5px;
				color: var(--coral);
				cursor: pointer;
				transition: background 0.15s;
			}
			.logout-btn:hover {
				background: var(--coral-g);
			}
			.logout-btn svg {
				width: 14px;
				height: 14px;
				stroke: var(--coral);
				fill: none;
				stroke-width: 1.8;
				stroke-linecap: round;
				stroke-linejoin: round;
			}

			/* MAIN */
			.main {
				margin-left: var(--sidebar-w);
				flex: 1;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				overflow-y: auto;
			}
			.topbar {
				position: sticky;
				top: 0;
				z-index: 50;
				background: rgba(11, 13, 18, 0.9);
				backdrop-filter: blur(12px);
				border-bottom: 1px solid var(--border);
				padding: 0 28px;
				height: 60px;
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			.topbar-left h1 {
				font-size: 16px;
				font-weight: 600;
				color: var(--text);
			}
			.topbar-left p {
				font-size: 12px;
				color: var(--muted);
				margin-top: 1px;
			}
			.btn-save-all {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 9px 18px;
				background: var(--green);
				color: #fff;
				border: none;
				border-radius: 10px;
				font-size: 13.5px;
				font-weight: 600;
				font-family: 'Inter', sans-serif;
				cursor: pointer;
				transition: opacity 0.2s;
				box-shadow: 0 4px 16px rgba(52, 211, 153, 0.3);
			}
			.btn-save-all:hover {
				opacity: 0.9;
			}
			.btn-save-all svg {
				width: 15px;
				height: 15px;
				stroke: #fff;
				fill: none;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}

			.content {
				padding: 28px;
				flex: 1;
			}

			/* KUN TANLASH */
			.day-selector {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 14px;
				padding: 20px 24px;
				margin-bottom: 24px;
				display: flex;
				align-items: center;
				gap: 16px;
			}
			.day-nav-btn {
				width: 36px;
				height: 36px;
				border-radius: 9px;
				border: 1px solid var(--border);
				background: var(--surface2);
				color: var(--muted2);
				cursor: pointer;
				font-size: 18px;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: all 0.15s;
				flex-shrink: 0;
			}
			.day-nav-btn:hover {
				border-color: var(--accent);
				color: var(--accent);
			}
			.day-info {
				flex: 1;
			}
			.day-info h2 {
				font-size: 18px;
				font-weight: 700;
				color: var(--text);
			}
			.day-info span {
				font-size: 12.5px;
				color: var(--muted);
			}
			.day-info h2.today {
				color: var(--green);
			}
			.today-btn {
				padding: 7px 16px;
				border-radius: 20px;
				border: 1px solid var(--border);
				background: var(--surface2);
				color: var(--muted2);
				font-size: 12.5px;
				cursor: pointer;
				transition: all 0.15s;
				white-space: nowrap;
			}
			.today-btn:hover {
				border-color: var(--green);
				color: var(--green);
			}
			.saved-badge {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 7px 14px;
				border-radius: 20px;
				background: var(--green-g);
				border: 1px solid rgba(52, 211, 153, 0.2);
				font-size: 12px;
				color: var(--green);
				font-weight: 500;
			}
			.saved-badge svg {
				width: 13px;
				height: 13px;
				stroke: var(--green);
				fill: none;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}

			/* LAVOZIM TABS */
			.lavozim-tabs {
				display: flex;
				gap: 8px;
				margin-bottom: 20px;
				flex-wrap: wrap;
			}
			.lav-tab {
				padding: 8px 16px;
				border-radius: 20px;
				font-size: 13px;
				font-weight: 500;
				cursor: pointer;
				border: 1px solid var(--border);
				color: var(--muted2);
				background: var(--surface);
				transition: all 0.15s;
				display: flex;
				align-items: center;
				gap: 6px;
			}
			.lav-tab svg {
				width: 13px;
				height: 13px;
				fill: none;
				stroke: currentColor;
				stroke-width: 2;
				stroke-linecap: round;
				stroke-linejoin: round;
			}
			.lav-tab:hover {
				border-color: var(--accent);
				color: var(--accent);
			}
			.lav-tab.active {
				color: #fff;
				border-color: transparent;
			}
			.lav-tab.t-baylovchi.active {
				background: var(--accent);
			}
			.lav-tab.t-chiqaruvchi.active {
				background: var(--green);
			}
			.lav-tab.t-yuvuvchi.active {
				background: var(--amber);
				color: #000;
			}
			.lav-tab.t-qurutuvchi.active {
				background: var(--purple);
			}
			.lav-tab.t-hamir.active {
				background: var(--coral);
			}
			.lav-tab.t-qirquvchi.active {
				background: var(--teal);
				color: #000;
			}
			.lav-count {
				font-size: 11px;
				font-weight: 700;
				padding: 1px 7px;
				border-radius: 20px;
				background: rgba(255, 255, 255, 0.15);
			}

			/* BAYLOVCHI NARX TABS */
			.baylov-narx-tabs {
				display: flex;
				gap: 8px;
				margin-bottom: 20px;
			}
			.bn-tab {
				padding: 7px 18px;
				border-radius: 20px;
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				border: 1px solid var(--border);
				color: var(--muted2);
				background: var(--surface2);
				transition: all 0.15s;
			}
			.bn-tab.active {
				background: var(--accent);
				color: #fff;
				border-color: var(--accent);
			}

			/* ISHCHILAR KARTOCHKALAR */
			.workers-grid {
				display: grid;
				grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
				gap: 14px;
			}
			.worker-card {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 12px;
				padding: 16px;
				transition: border-color 0.2s;
			}
			.worker-card:hover {
				border-color: rgba(79, 142, 247, 0.2);
			}
			.worker-card.has-data {
				border-color: rgba(52, 211, 153, 0.3);
			}
			.wc-top {
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 14px;
			}
			.wc-ava {
				width: 38px;
				height: 38px;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 13px;
				font-weight: 700;
				flex-shrink: 0;
			}
			.wc-name {
				font-size: 13.5px;
				font-weight: 600;
				color: var(--text);
			}
			.wc-lav {
				font-size: 11.5px;
				color: var(--muted);
				margin-top: 2px;
			}
			.wc-input-wrap {
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.wc-input {
				flex: 1;
				background: var(--bg);
				border: 1px solid var(--border);
				border-radius: 9px;
				padding: 10px 12px;
				font-size: 15px;
				font-weight: 600;
				font-family: 'Inter', sans-serif;
				color: var(--text);
				outline: none;
				text-align: center;
				transition:
					border-color 0.2s,
					box-shadow 0.2s;
			}
			.wc-input:focus {
				border-color: var(--accent);
				box-shadow: 0 0 0 3px rgba(79, 142, 247, 0.12);
			}
			.wc-input.filled {
				border-color: var(--green);
			}
			.wc-unit {
				font-size: 12px;
				font-weight: 600;
				color: var(--muted2);
				padding: 4px 10px;
				border-radius: 7px;
				background: var(--surface2);
				white-space: nowrap;
			}
			.wc-prev {
				font-size: 11px;
				color: var(--muted);
				margin-top: 8px;
				text-align: center;
			}
			.wc-prev b {
				color: var(--green);
			}

			/* SUMMARY PANEL */
			.summary-panel {
				background: var(--surface);
				border: 1px solid var(--border);
				border-radius: 14px;
				padding: 20px 24px;
				margin-top: 20px;
			}
			.summary-head {
				font-size: 14px;
				font-weight: 600;
				color: var(--text);
				margin-bottom: 16px;
			}
			.summary-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 12px;
			}
			.summary-item {
				background: var(--surface2);
				border-radius: 10px;
				padding: 14px;
				text-align: center;
			}
			.si-label {
				font-size: 11px;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.5px;
				margin-bottom: 6px;
			}
			.si-value {
				font-size: 20px;
				font-weight: 700;
				color: var(--text);
			}
			.si-unit {
				font-size: 12px;
				color: var(--muted2);
				margin-left: 3px;
			}

			/* EMPTY */
			.empty-state {
				padding: 60px 20px;
				text-align: center;
				color: var(--muted);
			}
			.empty-state svg {
				width: 40px;
				height: 40px;
				stroke: var(--muted);
				fill: none;
				stroke-width: 1.5;
				stroke-linecap: round;
				display: block;
				margin: 0 auto 14px;
			}
			.empty-state p {
				font-size: 14px;
				color: var(--muted2);
			}
			.empty-state span {
				font-size: 12px;
			}

			/* TOAST */
			.toast {
				position: fixed;
				bottom: 24px;
				right: 24px;
				background: var(--green);
				color: #fff;
				padding: 12px 20px;
				border-radius: 12px;
				font-size: 13.5px;
				font-weight: 600;
				box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
				z-index: 999;
				display: flex;
				align-items: center;
				gap: 8px;
				transform: translateY(80px);
				opacity: 0;
				transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
			}
			.toast.show {
				transform: translateY(0);
				opacity: 1;
			}
			.toast svg {
				width: 16px;
				height: 16px;
				stroke: #fff;
				fill: none;
				stroke-width: 2.5;
				stroke-linecap: round;
				stroke-linejoin: round;
			}

			::-webkit-scrollbar {
				width: 5px;
			}
			::-webkit-scrollbar-track {
				background: transparent;
			}
			::-webkit-scrollbar-thumb {
				background: var(--border);
				border-radius: 3px;
			}
			@keyframes fadeUp {
				from {
					opacity: 0;
					transform: translateY(8px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
			.worker-card {
				animation: fadeUp 0.3s ease both;
			}
			/* =========================================================
   RESPONSIVE STYLES — "Ish hisobi" sahifasi uchun
   Mobil va Tablet moslashuvi
   Asosiy CSS faylining OXIRIGA shu qismni qo'shing.
   HTML o'zgarmaydi, faqat CSS qo'shiladi.
   ========================================================= */

			/* -----------------------------------------------------------
   1) TABLET (≤1024px)
   ----------------------------------------------------------- */
			@media (max-width: 1024px) {
				:root {
					--sidebar-w: 200px;
				}

				.content {
					padding: 20px;
				}

				.day-selector {
					padding: 16px 18px;
					gap: 12px;
				}

				.workers-grid {
					grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
					gap: 12px;
				}

				.summary-grid {
					grid-template-columns: repeat(3, 1fr);
				}
			}

			/* -----------------------------------------------------------
   2) KICHIK TABLET / KATTA TELEFON (≤860px)
   Sidebar pastga bottom-nav bo'lib tushadi
   ----------------------------------------------------------- */
			@media (max-width: 860px) {
				body {
					flex-direction: column;
				}

				/* SIDEBAR -> PASTKI BOTTOM-NAV */
				.sidebar {
					position: fixed;
					top: auto;
					left: 0;
					right: 0;
					bottom: 0;
					width: 100%;
					min-height: auto;
					height: 64px;
					flex-direction: row;
					align-items: stretch;
					border-right: none;
					border-top: 1px solid var(--border);
					z-index: 200;
					background: rgba(18, 21, 29, 0.97);
					backdrop-filter: blur(12px);
				}

				.sidebar-brand {
					display: none;
				}

				.sidebar-nav {
					display: flex;
					flex-direction: row;
					align-items: stretch;
					gap: 2px;
					padding: 6px 6px;
					overflow-x: auto;
					overflow-y: visible;
					flex: 1;
					-webkit-overflow-scrolling: touch;
					scrollbar-width: none;
				}
				.sidebar-nav::-webkit-scrollbar {
					display: none;
				}

				.nav-section {
					display: flex;
					align-items: stretch;
					gap: 2px;
					margin-bottom: 0;
					flex-shrink: 0;
					width: 100%;
				}

				.nav-label {
					display: none;
				}

				.nav-item {
					flex: 1;
					min-width: 60px;
					flex-direction: column;
					justify-content: center;
					gap: 3px;
					padding: 6px 4px;
					white-space: nowrap;
					font-size: 9.5px;
					text-align: center;
					margin-bottom: 0;
					position: relative;
					border-radius: 10px;
				}
				.nav-item svg {
					width: 19px;
					height: 19px;
				}
				.nav-badge {
					margin-left: 0;
					position: absolute;
					top: 2px;
					right: 6px;
					font-size: 9px;
					padding: 0 5px;
				}

				.sidebar-footer {
					border-top: none;
					border-left: 1px solid var(--border);
					padding: 6px;
					flex-shrink: 0;
					display: flex;
					align-items: center;
					gap: 2px;
				}
				.user-card {
					padding: 6px;
					flex-direction: column;
					gap: 2px;
					background: transparent;
					border-radius: 10px;
				}
				.user-avatar {
					width: 26px;
					height: 26px;
					font-size: 11px;
				}
				.user-info {
					display: none;
				}
				.logout-btn {
					margin-top: 0;
					padding: 6px;
					flex-direction: column;
					gap: 2px;
					border-radius: 10px;
				}
				.logout-btn span {
					display: none;
				}

				.main {

			/* -----------------------------------------------------------

   ----------------------------------------------------------- */
			@media (max-width: 640px) {

				/* LAVOZIM TABS: gorizontal scroll, siqilmaydi */
				.lavozim-tabs {

				/* ISHCHI KARTOCHKALARI: bitta ustun, hammasi ko'rinadi */

				/* SUMMARY: 3 ustun -> moslashuvchan, hech narsa qisilmaydi */

				.si-unit {

				}

				/* TOAST: pastdagi bottom-nav bilan to'qnashmasligi uchun joyini ko'taramiz */
				.toast {
					bottom: 76px;
					right: 14px;
					left: 14px;
					justify-content: center;
					font-size: 12.5px;
					padding: 11px 16px;

			}

			/* -----------------------------------------------------------
   4) JUDA KICHIK TELEFON (≤380px)

			@media (max-width: 380px) {

		<script>
			// AUTH
			if (!localStorage.getItem('pinchuza_auth')) window.location.href = '../index.html';
			document.getElementById('logoutBtn').addEventListener('click', () => {
				if (confirm('Tizimdan chiqasizmi?')) {
					localStorage.removeItem('pinchuza_auth');
					window.location.href = '../index.html';
				}
			});

			// HELPERS
			function getData(key) {
				try {
					return JSON.parse(localStorage.getItem(key) || 'null');
				} catch {
					return null;
				}
			}
			function setData(key, val) {
				localStorage.setItem(key, JSON.stringify(val));
			}
			function getWorkers() {
				return getData('pinchuza_workers') || [];
			}

			const MONTHS = [
				'Yanvar',
				'Fevral',
				'Mart',
				'Aprel',
				'May',
				'Iyun',
				'Iyul',
				'Avgust',
				'Sentabr',
				'Oktabr',
				'Noyabr',
				'Dekabr',
			];
			const DAYS_UZ = ['Yakshanba', 'Dushanba', 'Seshanba', 'Chorshanba', 'Payshanba', 'Juma', 'Shanba'];

			const LAVOZIMLAR = [
				{ key: 'Baylovchi', label: 'Baylovchilar', cls: 't-baylovchi', birlik: 'qop', color: 'var(--accent)' },
				{ key: 'Chiqaruvchi', label: 'Chiqaruvchilar', cls: 't-chiqaruvchi', birlik: 'kg', color: 'var(--green)' },
				{ key: 'Yuvuvchi', label: 'Yuvuvchilar', cls: 't-yuvuvchi', birlik: 'kg', color: 'var(--amber)' },
				{ key: 'Qurutuvchi', label: 'Qurutuvchilar', cls: 't-qurutuvchi', birlik: 'kg', color: 'var(--purple)' },
				{ key: 'Hamir qiluvchi', label: 'Hamir qiluvchilar', cls: 't-hamir', birlik: 'kg', color: 'var(--coral)' },
				{ key: 'Qirquvchi', label: 'Qirquvchilar', cls: 't-qirquvchi', birlik: 'kg', color: 'var(--teal)' },
			];

			const AVO_COLORS = [
				{ bg: 'var(--accent-g)', c: 'var(--accent)' },
				{ bg: 'var(--green-g)', c: 'var(--green)' },
				{ bg: 'var(--amber-g)', c: 'var(--amber)' },
				{ bg: 'var(--purple-g)', c: 'var(--purple)' },
				{ bg: 'var(--coral-g)', c: 'var(--coral)' },
				{ bg: 'var(--teal-g)', c: 'var(--teal)' },
			];

			// NARX (kg yoki qop uchun) — keyinroq sozlamalardan olinadi
			const NARXLAR = {
				Baylovchi_4000: 4000,
				Baylovchi_5000: 5000,
				Chiqaruvchi: 0,
				Yuvuvchi: 0,
				Qurutuvchi: 0,
				'Hamir qiluvchi': 0,
				Qirquvchi: 0,
			};

			// STATE
			const now = new Date();
			let activeYear = now.getFullYear();
			let activeMonth = now.getMonth();
			let activeDay = now.getDate();
			let activeLavozim = LAVOZIMLAR[0].key;
			let activeBaylovNarx = '4000';

			function getDayKey() {
				return activeYear + '-' + String(activeMonth + 1).padStart(2, '0') + '-' + String(activeDay).padStart(2, '0');
			}

			function getIshData() {
				return getData('pinchuza_ish_' + getDayKey()) || {};
			}

			// KUN RENDER
			function renderDay() {
				const d = new Date(activeYear, activeMonth, activeDay);
				const isToday = activeYear === now.getFullYear() && activeMonth === now.getMonth() && activeDay === now.getDate();
				const title = activeDay + ' ' + MONTHS[activeMonth] + ', ' + activeYear;
				const el = document.getElementById('dayTitle');
				el.textContent = isToday ? '📅 Bugun — ' + title : title;
				el.className = isToday ? 'today' : '';
				document.getElementById('daySubtitle').textContent = DAYS_UZ[d.getDay()];
				document.getElementById('topbarSub').textContent =
					activeDay + ' ' + MONTHS[activeMonth] + ' ' + activeYear + " — ish ma'lumotlari";

				// Saved badge
				const ishData = getIshData();
				const hasSaved = Object.keys(ishData).length > 0;
				document.getElementById('savedBadge').style.display = hasSaved ? 'flex' : 'none';
			}

			// KUN NAVIGATSIYA
			document.getElementById('prevDay').addEventListener('click', () => {
				activeDay--;
				if (activeDay < 1) {
					activeMonth--;
					if (activeMonth < 0) {
						activeMonth = 11;
						activeYear--;
					}
					activeDay = new Date(activeYear, activeMonth + 1, 0).getDate();
				}
				renderAll();
			});
			document.getElementById('nextDay').addEventListener('click', () => {
				const maxDay = new Date(activeYear, activeMonth + 1, 0).getDate();
				activeDay++;
				if (activeDay > maxDay) {
					activeDay = 1;
					activeMonth++;
					if (activeMonth > 11) {
						activeMonth = 0;
						activeYear++;
					}
				}
				renderAll();
			});
			document.getElementById('todayBtn').addEventListener('click', () => {
				activeYear = now.getFullYear();
				activeMonth = now.getMonth();
				activeDay = now.getDate();
				renderAll();
			});

			// LAVOZIM TABLAR
			function renderLavozimTabs() {
				const workers = getWorkers();
				const tabs = document.getElementById('lavozimTabs');
				tabs.innerHTML = LAVOZIMLAR.map(lav => {
					const cnt = workers.filter(w => w.lavozim === lav.key).length;
					return `<div class="lav-tab ${lav.cls}${activeLavozim === lav.key ? ' active' : ''}"
      onclick="selectLavozim('${lav.key}')">
      <span>${lav.label}</span>
      <span class="lav-count">${cnt}</span>
    </div>`;
				}).join('');
			}

			function selectLavozim(key) {
				activeLavozim = key;
				activeBaylovNarx = '4000';
				document.getElementById('baylovNarxTabs').style.display = key === 'Baylovchi' ? 'flex' : 'none';
				document.querySelectorAll('.bn-tab').forEach(t => t.classList.toggle('active', t.dataset.narx === '4000'));
				renderLavozimTabs();
				renderWorkersGrid();
			}

			function selectNarx(narx) {
				activeBaylovNarx = narx;
				document.querySelectorAll('.bn-tab').forEach(t => t.classList.toggle('active', t.dataset.narx === narx));
				renderWorkersGrid();
			}

			// ISHCHILAR GRID
			function renderWorkersGrid() {
				const workers = getWorkers();
				const ishData = getIshData();
				const lav = LAVOZIMLAR.find(l => l.key === activeLavozim);
				const grid = document.getElementById('workersGrid');

				let filtered = workers.filter(w => w.lavozim === activeLavozim);
				if (activeLavozim === 'Baylovchi') {
					filtered = filtered.filter(w => w.baylovNarx === activeBaylovNarx);
				}

				if (filtered.length === 0) {
					grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <p>${lav ? lav.label : ''} topilmadi</p>
      <span>Avval <a href="ishchilar.html" style="color:var(--accent)">Ishchilar</a> sahifasida qo'shing</span>
    </div>`;
					document.getElementById('summaryPanel').style.display = 'none';
					return;
				}

				const birlik = activeLavozim === 'Baylovchi' ? 'qop' : '';

				grid.innerHTML = filtered
					.map((w, i) => {
						const clr = AVO_COLORS[i % AVO_COLORS.length];
						const initials = ((w.ism || '?')[0] + (w.familiya ? w.familiya[0] : '')).toUpperCase();
						const key = activeLavozim === 'Baylovchi' ? w.id + '_' + activeBaylovNarx : w.id;
						const savedVal = ishData[key] ? ishData[key].miqdor : '';
						const hasFilled = savedVal !== '' && savedVal !== undefined;

						// Kecha qanchata qilgan
						const prevDay = new Date(activeYear, activeMonth, activeDay - 1);
						const prevKey =
							prevDay.getFullYear() +
							'-' +
							String(prevDay.getMonth() + 1).padStart(2, '0') +
							'-' +
							String(prevDay.getDate()).padStart(2, '0');
						const prevData = getData('pinchuza_ish_' + prevKey) || {};
						const prevVal = prevData[key] ? prevData[key].miqdor : null;

						return `<div class="worker-card${hasFilled ? ' has-data' : ''}" id="card-${key}">
      <div class="wc-top">
        <div class="wc-ava" style="background:${clr.bg};color:${clr.c}">${initials}</div>
        <div>
          <div class="wc-name">${w.ism || ''} ${w.familiya || ''}</div>
          <div class="wc-lav">${w.lavozim}${w.baylovNarx ? ' · ' + parseInt(w.baylovNarx).toLocaleString() + " so'm" : ''}</div>
        </div>
      </div>
      <div class="wc-input-wrap">
        <input class="wc-input${hasFilled ? ' filled' : ''}"
          type="number" min="0" step="0.1"
          id="inp-${key}"
          value="${savedVal !== undefined ? savedVal : ''}"
          placeholder="0"
          oninput="onInputChange('${key}', this)"/>
        <div class="wc-unit">${birlik}</div>
      </div>
      ${prevVal !== null ? `<div class="wc-prev">Kecha: <b>${prevVal} ${birlik}</b></div>` : ''}
    </div>`;
					})
					.join('');

				renderSummary(filtered, ishData, birlik);
			}

			function onInputChange(key, input) {
				const val = input.value.trim();
				const card = document.getElementById('card-' + key);
				if (val && parseFloat(val) > 0) {
					input.classList.add('filled');
					card.classList.add('has-data');
				} else {
					input.classList.remove('filled');
					card.classList.remove('has-data');
				}
				// Live summary
				const workers = getWorkers();
				const ishData = getIshData();
				const filtered = workers.filter(w => {
					if (w.lavozim !== activeLavozim) return false;
					if (activeLavozim === 'Baylovchi') return w.baylovNarx === activeBaylovNarx;
					return true;
				});
				const birlik = activeLavozim === 'Baylovchi' ? 'qop' : 'kg';
				renderSummary(filtered, ishData, birlik);
			}

			function renderSummary(filtered, ishData, birlik) {
				const panel = document.getElementById('summaryPanel');
				panel.style.display = 'block';
				document.getElementById('summaryLavozim').textContent =
					activeLavozim + (activeLavozim === 'Baylovchi' ? ' (' + activeBaylovNarx + " so'm)" : '');

				let totalMiqdor = 0;
				let filledCount = 0;

				filtered.forEach(w => {
					const key = activeLavozim === 'Baylovchi' ? w.id + '_' + activeBaylovNarx : w.id;
					const inp = document.getElementById('inp-' + key);
					const val = inp ? parseFloat(inp.value) : ishData[key] ? parseFloat(ishData[key].miqdor) : 0;
					if (val > 0) {
						totalMiqdor += val;
						filledCount++;
					}
				});

				document.getElementById('sumWorkers').textContent = filledCount;
				document.getElementById('sumMiqdor').textContent = totalMiqdor % 1 === 0 ? totalMiqdor : totalMiqdor.toFixed(1);
				document.getElementById('sumUnit').textContent = birlik;

				// Taxminiy maosh
				const narxKey = activeLavozim === 'Baylovchi' ? activeLavozim + '_' + activeBaylovNarx : activeLavozim;
				const narx = getData('pinchuza_narxlar') ? getData('pinchuza_narxlar')[narxKey] || 0 : 0;
				if (narx > 0) {
					const maosh = Math.round(totalMiqdor * narx);
					document.getElementById('sumMaosh').textContent = maosh.toLocaleString() + " so'm";
				} else {
					document.getElementById('sumMaosh').textContent = 'Narx kiritilmagan';
				}
			}

			// SAQLASH
			document.getElementById('saveAllBtn').addEventListener('click', saveAll);

			function saveAll() {
				const workers = getWorkers();
				const dayKey = getDayKey();
				const ishData = getIshData();

				const filtered = workers.filter(w => {
					if (w.lavozim !== activeLavozim) return false;
					if (activeLavozim === 'Baylovchi') return w.baylovNarx === activeBaylovNarx;
					return true;
				});
				const birlik = activeLavozim === 'Baylovchi' ? 'qop' : 'kg';

				let savedCount = 0;
				filtered.forEach(w => {
					const key = activeLavozim === 'Baylovchi' ? w.id + '_' + activeBaylovNarx : w.id;
					const inp = document.getElementById('inp-' + key);
					if (!inp) return;
					const val = parseFloat(inp.value);
					if (!isNaN(val) && val >= 0) {
						ishData[key] = { miqdor: val, birlik, lavozim: activeLavozim, workerId: w.id, sana: dayKey };
						savedCount++;
					}
				});

				setData('pinchuza_ish_' + dayKey, ishData);
				showToast('✅ ' + savedCount + " ta ishchi ma'lumoti saqlandi!");
				document.getElementById('savedBadge').style.display = 'flex';
				renderWorkersGrid();
			}

			// TOAST
			function showToast(msg) {
				const t = document.getElementById('toast');
				document.getElementById('toastText').textContent = msg;
				t.classList.add('show');
				setTimeout(() => t.classList.remove('show'), 2800);
			}

			// RENDER ALL
			function renderAll() {
				renderDay();
				renderLavozimTabs();
				document.getElementById('baylovNarxTabs').style.display = activeLavozim === 'Baylovchi' ? 'flex' : 'none';
				renderWorkersGrid();
			}

			renderAll();
		</script>
	</body>
</html>
